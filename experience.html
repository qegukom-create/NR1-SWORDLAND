<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Annuaire & Puissance</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f1f5f9; --danger: #ef4444; --accent: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; }

        .add-box { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { background: #0f172a; border: 2px solid #334155; color: white; padding: 12px; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .input-name { flex: 2; }
        .input-power { flex: 1; }
        .input-alias { font-size: 14px; padding: 10px; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        
        /* Barre de recherche */
        .search-box { margin-bottom: 20px; }
        .search-box input { border-color: #475569; }

        .list-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 10px; border-bottom: 1px solid #334155; margin-bottom: 10px; }
        .count-badge { background: #334155; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }

        .member-card { background: var(--card); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.5s ease, transform 0.2s; }
        
        .member-left { display: flex; align-items: center; gap: 15px; }
        
        .rank-badge { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; font-size: 0.9rem; background: #334155; color: #94a3b8; flex-shrink: 0; }
        .rank-1 { background: #eab308; color: #0f172a; box-shadow: 0 0 10px rgba(234,179,8,0.3); }
        .rank-2 { background: #cbd5e1; color: #0f172a; }
        .rank-3 { background: #cd7f32; color: #fff; }

        .member-info { display: flex; flex-direction: column; }
        .member-name { font-weight: bold; font-size: 1.05rem; }
        .member-aliases { font-size: 0.75rem; color: #64748b; margin-top: 2px; font-style: italic; }
        .member-power { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        
        .actions { display: flex; gap: 10px; }
        .btn-action { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #64748b; transition: 0.2s; }
        .btn-edit:hover { color: var(--primary); }
        .btn-del:hover { color: var(--danger); }

        .member-card.highlight { background-color: #1e3a8a; border: 2px solid var(--primary); transform: scale(1.02); }

        /* Zone d'édition rapide adaptée pour puissance + alias */
        .edit-zone { background: #0f172a; padding: 12px; border-radius: 8px; margin-top: -4px; margin-bottom: 8px; display: none; flex-direction: column; gap: 8px; border: 1px dashed #334155; }
        .edit-zone.active { display: flex; }
        .edit-row { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NR1 👥 ANNUAIRE</h1>
        <p>Gestion des membres et Puissance (M)</p>
    </div>

    <!-- Formulaire d'ajout -->
    <div class="add-box">
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="m-name" class="input-name" placeholder="Nom principal du joueur...">
                <input type="number" id="m-power" class="input-power" placeholder="Puiss. (M)">
            </div>
            <input type="text" id="m-aliases" class="input-alias" placeholder="Alias / Anciens pseudos (séparés par des virgules)...">
        </div>
        <button class="btn-add" onclick="addMember()">Ajouter à la base</button>
    </div>

    <!-- Barre de recherche automatique -->
    <div class="search-box">
        <input type="text" id="search-member" placeholder="🔍 Rechercher (Nom principal ou Alias)..." oninput="searchAndScroll()">
    </div>

    <div class="list-header">
        <span>Membres classés par Puissance</span>
        <span class="count-badge" id="member-count">0</span>
    </div>

    <div id="memberList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const membersRef = db.ref('alliance_database');

    let currentMembers = [];

    function addMember() {
        const nameInput = document.getElementById('m-name');
        const powerInput = document.getElementById('m-power');
        const aliasInput = document.getElementById('m-aliases');
        
        const name = nameInput.value.trim();
        const power = powerInput.value || 0;
        const aliases = aliasInput.value.trim();
        
        if (name) {
            membersRef.push({
                name: name,
                power: parseFloat(power),
                aliases: aliases, // Sauvegarde de la chaîne brute d'alias
                createdAt: Date.now()
            });
            nameInput.value = "";
            powerInput.value = "";
            aliasInput.value = "";
            nameInput.focus();
        }
    }

    membersRef.on('value', (snap) => {
        const data = snap.val();
        const display = document.getElementById('memberList');
        const countBadge = document.getElementById('member-count');
        display.innerHTML = "";
        let count = 0;

        if (data) {
            currentMembers = Object.keys(data).map(id => ({
                id: id,
                ...data[id]
            })).sort((a, b) => {
                if (b.power !== a.power) {
                    return b.power - a.power;
                }
                return a.name.localeCompare(b.name);
            });

            count = currentMembers.length;

            currentMembers.forEach((m, index) => {
                const rank = index + 1;
                let rankClass = "";
                if (rank === 1) rankClass = "rank-1";
                else if (rank === 2) rankClass = "rank-2";
                else if (rank === 3) rankClass = "rank-3";

                // Affichage propre des alias sous le nom s'ils existent
                const aliasHTML = m.aliases ? `<span class="member-aliases">AKA: ${m.aliases}</span>` : '';

                display.innerHTML += `
                    <div class="member-card" id="card-${m.id}">
                        <div class="member-left">
                            <div class="rank-badge ${rankClass}">${rank}</div>
                            <div class="member-info">
                                <span class="member-name">${m.name}</span>
                                ${aliasHTML}
                                <span class="member-power">${m.power || 0} M</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="toggleEdit('${m.id}')">✎</button>
                            <button class="btn-action btn-del" onclick="removeMember('${m.id}')">✕</button>
                        </div>
                    </div>
                    <div id="edit-${m.id}" class="edit-zone">
                        <div class="edit-row">
                            <input type="number" id="new-power-${m.id}" value="${m.power || 0}" placeholder="Puissance" style="padding:8px; width:100px;">
                            <input type="text" id="new-aliases-${m.id}" value="${m.aliases || ''}" placeholder="Alias (ex: pseudo2, pseudo3)" style="padding:8px;">
                        </div>
                        <button class="btn-add" style="padding:8px; margin:0;" onclick="updateMemberData('${m.id}')">Enregistrer les modifications</button>
                    </div>
                `;
            });
        } else {
            currentMembers = [];
        }
        countBadge.innerText = count;
    });

    function searchAndScroll() {
        const query = document.getElementById('search-member').value.trim().toLowerCase();
        if (!query) return;

        // RECHERCHE AMÉLIORÉE : Cherche dans le nom OU dans la chaîne d'alias
        const found = currentMembers.find(m => {
            const matchName = m.name.toLowerCase().includes(query);
            const matchAlias = m.aliases ? m.aliases.toLowerCase().includes(query) : false;
            return matchName || matchAlias;
        });

        if (found) {
            const targetCard = document.getElementById(`card-${found.id}`);
            if (targetCard) {
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                targetCard.classList.add('highlight');
                setTimeout(() => {
                    targetCard.classList.remove('highlight');
                }, 1500);
            }
        }
    }

    function toggleEdit(id) {
        const zone = document.getElementById('edit-' + id);
        zone.classList.toggle('active');
    }

    // Fonction de mise à jour globale (Puissance + Alias)
    function updateMemberData(id) {
        const newPower = document.getElementById('new-power-' + id).value;
        const newAliases = document.getElementById('new-aliases-' + id).value.trim();
        
        membersRef.child(id).update({
            power: parseFloat(newPower),
            aliases: newAliases
        });
        toggleEdit(id);
    }

    function removeMember(id) {
        if(confirm("Supprimer ce membre ?")) {
            membersRef.child(id).remove();
        }
    }
</script>
</body>
</html>
