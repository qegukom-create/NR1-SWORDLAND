<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Swordland Tactical Grid 5x5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; 
            --text: #f8fafc; --border: #334155; --success: #22c55e;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header Layout */
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header-title h1 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; }
        
        .btn-nav { background: #0f172a; color: var(--primary); border: 1px solid var(--primary); padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .btn-nav:hover { background: rgba(251, 191, 36, 0.1); }

        /* Legion Tabs */
        .legion-tabs { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .tab-btn { background: #1e293b; border: 2px solid var(--border); color: #94a3b8; padding: 12px 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(251, 191, 36, 0.05); box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }

        /* Tactical Grid 5x5 */
        .tactical-map { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(5, auto); 
            gap: 10px; 
            background: #0b111e; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
        }
        
        .grid-cell { visibility: hidden; min-height: 50px; }
        
        .building-box { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 12px; border-top: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; transition: transform 0.2s;
            position: relative;
        }
        .building-box:hover { border-color: var(--primary); }
        
        .building-name { font-weight: bold; color: white; display: block; margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        
        .slot { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; position: relative; }
        .slot:last-child { margin-bottom: 0; }
        .slot label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: bold; }
        
        /* --- CUSTOM MULTISELECT DROPDOWN (PC ONLY) --- */
        .multiselect { position: relative; width: 100%; user-select: none; }
        .select-box { 
            background: #0f172a; color: white; border: 1px solid var(--border); padding: 8px; 
            border-radius: 5px; font-size: 0.85rem; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .select-box:hover { border-color: var(--primary); }
        .select-box::after { content: '▼'; font-size: 0.6rem; color: #64748b; }
        
        .dropdown-content { 
            display: none; position: absolute; background: #1e293b; min-width: 100%; 
            border: 1px solid var(--primary); border-radius: 5px; z-index: 100; 
            max-height: 160px; overflow-y: auto; box-shadow: 0px 8px 16px rgba(0,0,0,0.4);
            box-sizing: border-box; padding: 4px 0;
        }
        .dropdown-content.show { display: block; }
        
        .dropdown-item { 
            padding: 10px 12px; display: flex; align-items: center; gap: 10px; 
            color: var(--text); font-size: 0.9rem; cursor: pointer; user-select: none;
        }
        .dropdown-item:hover { background: #334155; }
        .dropdown-item input[type="checkbox"] { pointer-events: none; accent-color: var(--primary); margin: 0; width: 18px; height: 18px; }

        /* --- RESPONSIVE MODAL SYSTEM (MOBILE) --- */
        .building-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 95%; max-width: 450px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 90vh; }
        .modal-header { font-size: 1.1rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-transform: uppercase; text-align: center; }
        .modal-body-scroll { overflow-y: auto; flex: 1; padding-right: 5px; }

        .btn-close-modal { background: var(--success); color: #0f172a; border: none; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; font-size: 1rem; }

        /* Mobile specific list layout */
        .mob-role-title { color: var(--primary); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin: 15px 0 8px 0; border-left: 3px solid var(--primary); padding-left: 6px; }
        .mob-players-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: #0f172a; padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
        
        .mob-player-btn { 
            background: #1e293b; border: 1px solid var(--border); color: #94a3b8; 
            padding: 10px 6px; border-radius: 6px; text-align: center; font-size: 0.8rem; 
            font-weight: bold; cursor: pointer; transition: 0.1s; user-select: none;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .mob-player-btn.selected { background: rgba(251, 191, 36, 0.15); border-color: var(--primary); color: var(--primary); }

        /* Styles PC vs Mobile */
        @media (max-width: 900px) {
            body { padding: 10px; }
            .header-area { flex-direction: column; gap: 15px; text-align: center; }
            .legion-tabs { flex-direction: column; width: 100%; gap: 10px; }
            .tab-btn { width: 100%; }
            .tactical-map { gap: 6px; padding: 8px; }
            
            .building-box .slot { display: none; }
            .building-box { padding: 8px 4px; min-height: 60px; justify-content: center; }
            .building-name { margin-bottom: 0; border-bottom: none; padding-bottom: 0; font-size: 0.65rem; letter-spacing: 0px; }
            .grid-cell { min-height: 60px; }
        }

        @media (min-width: 901px) {
            .building-box { cursor: default; transform: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <div class="header-title">
            <h1>⚔️ SWORDLAND STRATEGIC MAP</h1>
        </div>
        <a href="experience.html" class="btn-nav">📂 Open Experience Directory</a>
    </div>

    <div class="legion-tabs">
        <button class="tab-btn active" id="btn-legion1" onclick="switchLegion('legion1')">🛡️ Legion 1 (12:00)</button>
        <button class="tab-btn" id="btn-legion2" onclick="switchLegion('legion2')">⚡ Legion 2 (19:00)</button>
    </div>

    <div class="tactical-map" id="map-grid"></div>
</div>

<div class="building-modal" id="b-modal">
    <div class="modal-content">
        <div class="modal-header" id="modal-b-name">Bâtiment</div>
        <div class="modal-body-scroll" id="modal-slots-container"></div>
        <button class="btn-close-modal" onclick="closeBuildingModal()">✅ OK / Fermer</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentLegion = 'legion1';
    let allianceDatabase = {};
    let globalExperience = {};

    const mapLayout = {
        "1-2": { id: "Belltower", name: "Bell Tower" },
        "1-4": { id: "Abbey-1", name: "Abbey 1" },
        "2-1": { id: "Northwest-Sanctum", name: "Northwest Sanctum" },
        "2-3": { id: "Mercenary-Camp", name: "Mercenary Camp" },
        "2-5": { id: "Abbey-2", name: "Abbey 2" },
        "4-1": { id: "Abbey-3", name: "Abbey 3" },
        "3-3": { id: "Swordshrine", name: "Swordshrine" },
        "3-5": { id: "Southeast-Sanctum", name: "Southeast Sanctum" },
        "3-1": { id: "Abbey-4", name: "Abbey 4" }, 
        "4-3": { id: "Hall-of-Reformation", name: "Hall of Reformation" },
        "4-5": { id: "Stables", name: "Stables" } 
    };

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.multiselect')) {
            closeAllDropdowns();
        }
    });

    function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
    }

    function toggleDropdown(id, event) {
        if (window.innerWidth <= 900) return; 
        event.stopPropagation();
        const el = document.getElementById(id);
        const willShow = !el.classList.contains('show');
        closeAllDropdowns();
        if (willShow) el.classList.add('show');
    }

    function generateCheckboxItems(buildingId, role, pList) {
        let html = '';
        pList.forEach(p => {
            html += `
                <div class="dropdown-item" onclick="toggleItemSelection('${buildingId}', '${role}', '${p.id}', event)">
                    <input type="checkbox" id="pc-chk-${buildingId}-${role}-${p.id}" data-building="${buildingId}" data-role="${role}" data-playerid="${p.id}">
                    <span>${p.name}</span>
                </div>
            `;
        });
        return html;
    }

    function generateMobileButtons(buildingId, role, pList) {
        let html = '';
        pList.forEach(p => {
            html += `
                <div class="mob-player-btn" id="mob-btn-${buildingId}-${role}-${p.id}" onclick="toggleMobileSelection('${buildingId}', '${role}', '${p.id}')">
                    ${p.name}
                </div>
            `;
        });
        return html;
    }

    function toggleItemSelection(buildingId, role, playerId, event) {
        if(event) event.stopPropagation();
        const chk = document.getElementById(`pc-chk-${buildingId}-${role}-${playerId}`);
        if (!chk) return;

        const newStatus = !chk.checked;
        chk.checked = newStatus;

        db.ref(`swordland_tactical/${currentLegion}/${buildingId}/${role}/${playerId}`).set(newStatus ? true : null);
        updateBoxLabel(buildingId, role);
    }

    function toggleMobileSelection(buildingId, role, playerId) {
        const btn = document.getElementById(`mob-btn-${buildingId}-${role}-${playerId}`);
        const pcChk = document.getElementById(`pc-chk-${buildingId}-${role}-${playerId}`);
        
        if (!btn || !pcChk) return;

        const newStatus = !btn.classList.contains('selected');
        
        // Màj Visuelle Mobile immédiate
        if(newStatus) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }

        // Màj Miroir PC lié
        pcChk.checked = newStatus;

        // Sync Firebase
        db.ref(`swordland_tactical/${currentLegion}/${buildingId}/${role}/${playerId}`).set(newStatus ? true : null);
        updateBoxLabel(buildingId, role);
    }

    function buildGridHTML() {
        const gridContainer = document.getElementById('map-grid');
        gridContainer.innerHTML = '';

        const lists = { commander: [], rally1: [], rally2: [], garrison: [] };
        const sortedIds = Object.keys(allianceDatabase).sort((a,b) => allianceDatabase[a].name.localeCompare(allianceDatabase[b].name));

        sortedIds.forEach(id => {
            const pName = allianceDatabase[id].name;
            const pRoles = globalExperience[id] || [];
            const pObj = { id: id, name: pName };

            if (pRoles.includes("Commander")) lists.commander.push(pObj);
            if (pRoles.includes("Rally-Leader") || pRoles.includes("Assassins")) {
                lists.rally1.push(pObj);
                lists.rally2.push(pObj);
            }
            if (pRoles.includes("Defenders") || pRoles.includes("Support")) lists.garrison.push(pObj);
        });

        window.cachedLists = lists; 

        for (let row = 1; row <= 5; row++) {
            for (let col = 1; col <= 5; col++) {
                const coord = `${row}-${col}`;
                
                if (mapLayout[coord]) {
                    const b = mapLayout[coord];
                    gridContainer.innerHTML += `
                        <div class="building-box" onclick="openBuildingModal('${b.id}', '${b.name}')">
                            <span class="building-name">${b.name}</span>
                            
                            <div class="slot">
                                <label>👑 Commander</label>
                                <div class="multiselect">
                                    <div class="select-box" id="pc-box-${b.id}-commander" onclick="toggleDropdown('pc-drop-${b.id}-commander', event)">Unassigned</div>
                                    <div class="dropdown-content" id="pc-drop-${b.id}-commander">
                                        ${generateCheckboxItems(b.id, 'commander', lists.commander)}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slot">
                                <label>⚔️ Rally 1</label>
                                <div class="multiselect">
                                    <div class="select-box" id="pc-box-${b.id}-rally1" onclick="toggleDropdown('pc-drop-${b.id}-rally1', event)">Unassigned</div>
                                    <div class="dropdown-content" id="pc-drop-${b.id}-rally1">
                                        ${generateCheckboxItems(b.id, 'rally1', lists.rally1)}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slot">
                                <label>⚔️ Rally 2</label>
                                <div class="multiselect">
                                    <div class="select-box" id="pc-box-${b.id}-rally2" onclick="toggleDropdown('pc-drop-${b.id}-rally2', event)">Unassigned</div>
                                    <div class="dropdown-content" id="pc-drop-${b.id}-rally2">
                                        ${generateCheckboxItems(b.id, 'rally2', lists.rally2)}
                                    </div>
                                </div>
                            </div>

                            <div class="slot">
                                <label>🛡️ Garrison</label>
                                <div class="multiselect">
                                    <div class="select-box" id="pc-box-${b.id}-garrison" onclick="toggleDropdown('pc-drop-${b.id}-garrison', event)">Unassigned</div>
                                    <div class="dropdown-content" id="pc-drop-${b.id}-garrison">
                                        ${generateCheckboxItems(b.id, 'garrison', lists.garrison)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    gridContainer.innerHTML += `<div class="grid-cell"></div>`;
                }
            }
        }
    }

    function updateBoxLabel(buildingId, role) {
        const checkedBoxes = document.querySelectorAll(`[id^="pc-chk-${buildingId}-${role}-"]:checked`);
        const count = checkedBoxes.length;
        
        let txt = "Unassigned";
        if (count === 1) {
            txt = allianceDatabase[checkedBoxes[0].getAttribute('data-playerid')]?.name || "1 Player";
        } else if (count > 1) {
            txt = `${count} Selected`;
        }

        const pcBox = document.getElementById(`pc-box-${buildingId}-${role}`);
        if (pcBox) pcBox.innerText = txt;
    }

    function openBuildingModal(buildingId, buildingName) {
        if (window.innerWidth > 900) return;

        document.getElementById('modal-b-name').innerText = `📍 ${buildingName}`;
        const container = document.getElementById('modal-slots-container');
        
        container.innerHTML = `
            <div class="mob-role-title">👑 Commander</div>
            <div class="mob-players-list">
                ${generateMobileButtons(buildingId, 'commander', window.cachedLists.commander)}
            </div>
            
            <div class="mob-role-title">⚔️ Rally 1 (RL / Assassin)</div>
            <div class="mob-players-list">
                ${generateMobileButtons(buildingId, 'rally1', window.cachedLists.rally1)}
            </div>
            
            <div class="mob-role-title">⚔️ Rally 2 (RL / Assassin)</div>
            <div class="mob-players-list">
                ${generateMobileButtons(buildingId, 'rally2', window.cachedLists.rally2)}
            </div>
            
            <div class="mob-role-title">🛡️ Garrison (Def / Support)</div>
            <div class="mob-players-list">
                ${generateMobileButtons(buildingId, 'garrison', window.cachedLists.garrison)}
            </div>
        `;

        // Appliquer la classe .selected sur les boutons mobiles si cochés sur PC
        document.querySelectorAll(`[id^="pc-chk-${buildingId}-"]`).forEach(pcChk => {
            if (pcChk.checked) {
                const role = pcChk.getAttribute('data-role');
                const pId = pcChk.getAttribute('data-playerid');
                const btn = document.getElementById(`mob-btn-${buildingId}-${role}-${pId}`);
                if (btn) btn.classList.add('selected');
            }
        });

        document.getElementById('b-modal').style.display = 'flex';
    }

    function closeBuildingModal() {
        document.getElementById('b-modal').style.display = 'none';
    }

    function init() {
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            allianceDatabase = data.alliance_database || {};
            globalExperience = data.global_experience || {};

            buildGridHTML();
            loadAssignments();
        });
    }

    function switchLegion(legion) {
        currentLegion = legion;
        document.getElementById('btn-legion1').classList.toggle('active', legion === 'legion1');
        document.getElementById('btn-legion2').classList.toggle('active', legion === 'legion2');
        loadAssignments();
    }

    function loadAssignments() {
        db.ref(`swordland_tactical/${currentLegion}`).once('value', snap => {
            const data = snap.val() || {};
            
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);

            Object.keys(data).forEach(buildingId => {
                const roles = data[buildingId];
                Object.keys(roles).forEach(role => {
                    const playersObj = roles[role]; 
                    if (playersObj && typeof playersObj === 'object') {
                        Object.keys(playersObj).forEach(pId => {
                            const pcChk = document.getElementById(`pc-chk-${buildingId}-${role}-${pId}`);
                            if (pcChk) pcChk.checked = true;
                        });
                    }
                    updateBoxLabel(buildingId, role);
                });
            });
            
            Object.values(mapLayout).forEach(b => {
                if (!data[b.id]) {
                    ['commander', 'rally1', 'rally2', 'garrison'].forEach(r => updateBoxLabel(b.id, r));
                }
            });
        });
    }

    init();
</script>
</body>
</html>
