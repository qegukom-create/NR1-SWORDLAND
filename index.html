<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Swordland Showdown</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        
        h1 { color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 20px; }

        /* Sélecteur de Légion */
        .legion-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .legion-btn { flex: 1; padding: 15px; border: 2px solid var(--accent); border-radius: 12px; background: none; color: white; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .legion-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        /* Panel d'assignation */
        .assign-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        select { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 100%; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 11px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 42px; }

        /* Grille des Rôles */
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .role-card { background: var(--card); border-radius: 12px; padding: 15px; border-top: 4px solid var(--accent); }
        .role-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        
        .player-row { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; }
        .player-row.high-power { border-left-color: #ef4444; }
        .player-name { font-weight: 500; }
        .player-power { font-size: 0.75rem; color: #10b981; margin-left: 8px; }
        
        .btn-remove { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; }
        .btn-remove:hover { color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Swordland Strategist</h1>

    <div class="legion-nav">
        <button id="nav-L1" class="legion-btn active" onclick="switchLegion('L1')">LÉGION 1</button>
        <button id="nav-L2" class="legion-btn" onclick="switchLegion('L2')">LÉGION 2</button>
    </div>

    <div class="assign-box">
        <div>
            <label>Choisir un membre</label>
            <select id="select-member"><option>Chargement...</option></select>
        </div>
        <div>
            <label>Attribuer un rôle</label>
            <select id="select-role">
                <option value="Commander">👑 Commander</option>
                <option value="Assassin">🗡️ Assassin</option>
                <option value="Guard">🛡️ Guard</option>
                <option value="Scout">🏃 Scout</option>
                <option value="Support">🧪 Support</option>
            </select>
        </div>
        <button class="btn-add" onclick="assignPlayer()">Assigner</button>
    </div>

    <div class="role-grid" id="roleDisplay"></div>
</div>

<script>
    // Configuration Firebase (utilise tes accès habituels)
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentLegion = 'L1';
    let allMembers = {};

// 1. Charger l'annuaire pour remplir le menu déroulant (Tri par Puissance)
    db.ref('alliance_database').on('value', snap => {
        allMembers = snap.val() || {};
        const select = document.getElementById('select-member');
        select.innerHTML = "";
        
        // Conversion en tableau pour pouvoir trier par puissance
        const sortedByPower = Object.keys(allMembers).map(id => ({
            id: id,
            ...allMembers[id]
        })).sort((a, b) => {
            // Tri décroissant : le plus puissant en premier
            return (b.power || 0) - (a.power || 0);
        });

        // Remplissage du menu de sélection
        sortedByPower.forEach(m => {
            select.innerHTML += `<option value="${m.id}">${m.name} (${m.power || 0}M)</option>`;
        });
    });

    // 2. Changer de légion
    function switchLegion(legion) {
        currentLegion = legion;
        document.querySelectorAll('.legion-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + legion).classList.add('active');
        renderRoles();
    }

    // 3. Assigner un joueur (ajoute la caractéristique au membre)
    function assignPlayer() {
        const memberId = document.getElementById('select-member').value;
        const role = document.getElementById('select-role').value;
        
        // On enregistre l'assignation dans une branche spécifique à Swordland
        // pour ne pas "polluer" l'annuaire tout en gardant le lien
        db.ref(`swordland_assignments/${currentLegion}/${memberId}`).set({
            role: role,
            timestamp: Date.now()
        });
    }

    // 4. Afficher la grille
    const ROLES_LIST = ["Commander", "Assassin", "Guard", "Scout", "Support"];
    
    function renderRoles() {
        db.ref(`swordland_assignments/${currentLegion}`).on('value', snap => {
            const assignments = snap.val() || {};
            const display = document.getElementById('roleDisplay');
            display.innerHTML = "";

            ROLES_LIST.forEach(roleName => {
                let playersHtml = "";
                let count = 0;

                Object.keys(assignments).forEach(mId => {
                    if (assignments[mId].role === roleName && allMembers[mId]) {
                        count++;
                        const m = allMembers[mId];
                        playersHtml += `
                            <div class="player-row ${m.power > 100 ? 'high-power' : ''}">
                                <div>
                                    <span class="player-name">${m.name}</span>
                                    <span class="player-power">${m.power}M</span>
                                </div>
                                <button class="btn-remove" onclick="removeAssignment('${mId}')">✕</button>
                            </div>`;
                    }
                });

                display.innerHTML += `
                    <div class="role-card">
                        <div class="role-header">
                            <span>${roleName}s</span>
                            <span>${count}</span>
                        </div>
                        ${playersHtml || '<div style="opacity:0.3; font-size:0.8rem">Aucun assigné</div>'}
                    </div>`;
            });
        });
    }

    function removeAssignment(mId) {
        db.ref(`swordland_assignments/${currentLegion}/${mId}`).remove();
    }

    // Lancement initial
    renderRoles();

</script>
</body>
</html>
