<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Swordland Strategist & Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #fbbf24; --accent: #8b5cf6; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }

        /* Navigation & Admin */
        .legion-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .legion-btn { flex: 1; padding: 15px; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .legion-btn.active { border-color: var(--accent); background: var(--accent); color: #000; }
        
        .btn-reset { background: #334155; color: var(--danger); border: 1px solid var(--danger); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-reset:hover { background: var(--danger); color: white; }

        /* Panels */
        .mgmt-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 30px; }
        .panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        .panel-title { font-weight: bold; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; font-size: 0.9rem; border-bottom: 1px solid #334155; padding-bottom: 8px; display: flex; justify-content: space-between; }
        
        select, input { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* Roster & Chips */
        .roster-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .member-chip { display: inline-flex; align-items: center; background: #0f172a; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #334155; cursor: pointer; }
        .member-chip:hover { border-color: var(--primary); }
        .chip-del { margin-left: 8px; color: #64748b; border: none; background: none; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #475569; }
        .status-present { background: var(--success); box-shadow: 0 0 5px var(--success); }

        /* Role Cards */
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .role-card { background: var(--card); border-radius: 12px; padding: 15px; border-top: 4px solid var(--accent); }
        .player-row { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }

        /* Modal */
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card); padding: 25px; border-radius: 16px; width: 300px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>⚔️ SWORDLAND STRATEGIST</h1>
        <button class="btn-reset" onclick="archiveAndReset()">Reset & Archive Event</button>
    </div>

    <div class="legion-nav">
        <button id="nav-L1" class="legion-btn active" onclick="switchLegion('L1')">LEGION 1</button>
        <button id="nav-L2" class="legion-btn" onclick="switchLegion('L2')">LEGION 2</button>
    </div>

    <div class="mgmt-grid">
        <div class="panel">
            <div class="panel-title" id="admit-title">1. Admit to LEGION 1</div>
            <select id="select-global-member"><option>Loading...</option></select>
            <button class="btn-add" onclick="addToLegion()">Add Member</button>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span id="roster-title">LEGION 1 ROSTER</span>
                <span id="legion-count" style="font-size: 0.7rem; color: var(--primary);">0</span>
            </div>
            <div class="roster-container" id="legion-roster-display"></div>
        </div>
    </div>

    <div class="role-grid" id="roleDisplay"></div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-player-name" style="margin-top:0; color:var(--primary)">Player Name</h3>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px;">
            <input type="checkbox" id="modal-present" style="width: auto;"> Present
        </label>
        <input type="number" id="modal-points" placeholder="Points Scored">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-add" onclick="saveReport()" style="background:var(--success)">Save</button>
            <button class="btn-add" onclick="closeModal()" style="background:#475569">Cancel</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU",
        authDomain: "nr1-vikings.firebaseapp.com",
        databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nr1-vikings"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentLegion = 'L1', allMembers = {}, editingPlayerId = null;
    const ROLES = ["Commander", "Assassin", "Guard", "Scout", "Support"];

    function switchLegion(l) {
        currentLegion = l;
        document.querySelectorAll('.legion-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-'+l).classList.add('active');
        document.getElementById('roster-title').innerText = l + ' ROSTER';
        document.getElementById('admit-title').innerText = '1. Admit to ' + l;
        renderAll();
    }

    // --- ARCHIVE LOGIC ---
    function archiveAndReset() {
        const date = new Date().toISOString().split('T')[0];
        if(!confirm(`This will archive all current scores/roles for the date: ${date} and reset the board. Proceed?`)) return;

        db.ref('swordland').once('value', snap => {
            const data = snap.val();
            // 1. Save snapshot to archives
            db.ref(`swordland_archives/${date}`).set(data, () => {
                // 2. Clear current reports and assignments
                db.ref('swordland/reports').remove();
                db.ref('swordland/assignments').remove();
                alert("Archive complete. Roles and scores have been reset.");
            });
        });
    }

    function openModal(id, name) {
        editingPlayerId = id;
        document.getElementById('modal-player-name').innerText = name;
        db.ref(`swordland/reports/${id}`).once('value', snap => {
            const val = snap.val() || { present: false, points: 0 };
            document.getElementById('modal-present').checked = val.present;
            document.getElementById('modal-points').value = val.points;
            document.getElementById('modal-overlay').style.display = 'flex';
        });
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function saveReport() {
        db.ref(`swordland/reports/${editingPlayerId}`).set({
            present: document.getElementById('modal-present').checked,
            points: parseInt(document.getElementById('modal-points').value) || 0
        });
        closeModal();
    }

    function addToLegion() {
        const id = document.getElementById('select-global-member').value;
        if (id) db.ref(`swordland/rosters/${currentLegion}/${id}`).set(true);
    }

    function removeFromLegion(id) {
        db.ref(`swordland/rosters/${currentLegion}/${id}`).remove();
        db.ref(`swordland/assignments/${currentLegion}/${id}`).remove();
    }

    function assignRole(role, id) { if(id) db.ref(`swordland/assignments/${currentLegion}/${id}`).set(role); }
    function removeRole(id) { db.ref(`swordland/assignments/${currentLegion}/${id}`).remove(); }

    function renderAll() {
        db.ref('alliance_database').once('value', memberSnap => {
            allMembers = memberSnap.val() || {};
            db.ref('swordland').on('value', swordSnap => {
                const data = swordSnap.val() || {}, rosters = data.rosters || {}, assign = data.assignments || {}, reports = data.reports || {};
                const currentRoster = rosters[currentLegion] || {}, currentAssign = assign[currentLegion] || {};

                const select = document.getElementById('select-global-member');
                select.innerHTML = '<option value="">Select a member...</option>';
                Object.keys(allMembers).sort((a,b) => (allMembers[b].power||0)-(allMembers[a].power||0)).forEach(id => {
                    if (!rosters.L1?.[id] && !rosters.L2?.[id]) select.innerHTML += `<option value="${id}">${allMembers[id].name} (${allMembers[id].power}M)</option>`;
                });

                const rosterDiv = document.getElementById('legion-roster-display');
                rosterDiv.innerHTML = "";
                let count = 0; const available = [];
                Object.keys(currentRoster).forEach(id => {
                    if (allMembers[id]) {
                        count++; available.push({ id, ...allMembers[id] });
                        const rep = reports[id] || { present: false, points: 0 };
                        rosterDiv.innerHTML += `
                            <div class="member-chip" onclick="openModal('${id}', '${allMembers[id].name}')">
                                <div class="status-dot ${rep.present ? 'status-present' : ''}"></div>
                                ${allMembers[id].name} ${rep.points > 0 ? `(${rep.points.toLocaleString()})` : ''}
                                <button class="chip-del" onclick="event.stopPropagation(); removeFromLegion('${id}')">✕</button>
                            </div>`;
                    }
                });
                document.getElementById('legion-count').innerText = count;

                const roleGrid = document.getElementById('roleDisplay');
                roleGrid.innerHTML = "";
                ROLES.forEach(role => {
                    let playersHtml = "", options = `<option value="">+ Assign ${role}</option>`;
                    available.sort((a,b) => b.power - a.power).forEach(m => {
                        if (currentAssign[m.id] === role) {
                            playersHtml += `<div class="player-row"><div><b>${m.name}</b> <small>${m.power}M</small></div><button class="chip-del" onclick="removeRole('${m.id}')">✕</button></div>`;
                        } else if (!currentAssign[m.id]) {
                            options += `<option value="${m.id}">${m.name} (${m.power}M)</option>`;
                        }
                    });
                    roleGrid.innerHTML += `<div class="role-card"><div class="role-name">${role}s</div><select onchange="assignRole('${role}', this.value)">${options}</select><div>${playersHtml || '<small style="opacity:0.3">Empty</small>'}</div></div>`;
                });
            });
        });
    }
    renderAll();
</script>
</body>
</html>
